<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>เข้าสู่ระบบ — โรงอาหาร PPK</title>
<link rel="stylesheet" href="/common.css">
<link rel="manifest" href="/manifest.json">
<style>
body {
  background: #111827;
  min-height: 100vh; display: flex; align-items: center; justify-content: center;
  padding: 1.5rem;
}
body::before {
  content: ''; position: fixed; inset: 0;
  background: radial-gradient(ellipse at 30% 20%, rgba(16,185,129,.08) 0%, transparent 60%),
              radial-gradient(ellipse at 70% 80%, rgba(59,130,246,.06) 0%, transparent 50%);
  pointer-events: none;
}
.login-card {
  background: #fff; border-radius: 20px; width: 100%; max-width: 400px;
  box-shadow: 0 25px 50px rgba(0,0,0,.3); overflow: hidden; position: relative; z-index: 1;
}
.login-header {
  padding: 2.2rem 2rem 1.8rem; text-align: center;
  background: linear-gradient(135deg, #059669 0%, #047857 100%);
  color: #fff;
}
.login-header .logo { font-size: 2.5rem; margin-bottom: .3rem; filter: drop-shadow(0 2px 4px rgba(0,0,0,.15)); }
.login-header h1 { font-size: 1.25rem; font-weight: 600; letter-spacing: -.02em; margin: 0; }
.login-header p { margin: 4px 0 0; opacity: .8; font-size: .82rem; font-weight: 300; }
.login-body { padding: 2rem; }
.login-body .form-group { margin-bottom: 1.2rem; }
.login-body label { display: block; font-weight: 500; margin-bottom: 5px; color: #374151; font-size: .85rem; }
.login-body input {
  width: 100%; padding: 11px 14px; border: 1.5px solid #E5E7EB;
  border-radius: 8px; font-size: .95rem; transition: all .18s;
  background: #F9FAFB; color: #1F2937;
}
.login-body input::placeholder { color: #9CA3AF; }
.login-body input:hover { border-color: #D1D5DB; }
.login-body input:focus { outline: none; border-color: #10B981; box-shadow: 0 0 0 3px rgba(16,185,129,.15); background: #fff; }
.login-body .btn { width: 100%; padding: 12px; font-size: .95rem; font-weight: 600; border-radius: 8px; letter-spacing: .01em; }
.login-footer { text-align: center; padding: 0 2rem 1.5rem; }
.login-footer a { color: #6B7280; font-size: .82rem; transition: color .18s; }
.login-footer a:hover { color: #10B981; }
.consent-row { display: flex; align-items: flex-start; gap: .6rem; margin-bottom: 1.2rem; }
.consent-row input[type=checkbox] { margin-top: 2px; width: auto; flex-shrink: 0; }
.consent-row label { font-weight: 400; font-size: .8rem; color: #6B7280; cursor: pointer; line-height: 1.5; }
.consent-row a { color: #10B981; }
#setup-form { display: none; }
.alert { padding: .7rem 1rem; border-radius: 8px; margin-bottom: 1rem; font-size: .88rem; border: 1px solid transparent; }
.alert-error { background: #FEF2F2; color: #B91C1C; border-color: #FECACA; }
.alert-success { background: #F0FDF4; color: #166534; border-color: #BBF7D0; }
.pw-wrap { position: relative; }
.pw-wrap input { padding-right: 2.8rem; }
.pw-toggle { position: absolute; right: .6rem; top: 50%; transform: translateY(-50%); background: none; border: none; cursor: pointer; font-size: 1.1rem; color: #9CA3AF; padding: .25rem; line-height: 1; transition: color .18s; border-radius: 4px; }
.pw-toggle:hover { color: #10B981; }
</style>
</head>
<body>
<div class="login-card">
  <div class="login-header">
    <div class="logo">🍽️</div>
    <h1>ระบบจัดการโรงอาหาร</h1>
    <p>โรงเรียนพะเยาพิทยาคม</p>
  </div>

  <div class="login-body">
    <div id="message"></div>

    <!-- Login Form -->
    <form id="login-form" onsubmit="handleLogin(event)">
      <div class="form-group">
        <label for="phone">เบอร์โทรศัพท์</label>
        <input type="tel" id="phone" name="phone" placeholder="0812345678" maxlength="10" required autocomplete="tel">
      </div>
      <div class="form-group">
        <label for="password">รหัสผ่าน</label>
        <div class="pw-wrap">
          <input type="password" id="password" name="password" placeholder="••••••••" required autocomplete="current-password">
          <button type="button" class="pw-toggle" onclick="togglePw(this)">👁</button>
        </div>
      </div>
      <div class="consent-row">
        <input type="checkbox" id="consent" required>
        <label for="consent">ข้าพเจ้ายินยอมให้ระบบจัดเก็บและใช้ข้อมูลส่วนบุคคลเพื่อการจัดการโรงอาหาร ตาม <a href="/privacy.html" target="_blank">นโยบายความเป็นส่วนตัว</a></label>
      </div>
      <button type="submit" class="btn btn-primary" id="login-btn">เข้าสู่ระบบ</button>
    </form>

    <!-- First-time Setup Form -->
    <form id="setup-form" onsubmit="handleSetPassword(event)">
      <div class="alert alert-success">ตั้งรหัสผ่านครั้งแรก — กรอกเบอร์โทร, Token ที่ได้รับ และรหัสผ่านใหม่</div>
      <div class="form-group">
        <label for="setup-phone">เบอร์โทรศัพท์</label>
        <input type="tel" id="setup-phone" name="phone" placeholder="0812345678" maxlength="10" required>
      </div>
      <div class="form-group">
        <label for="setup-token">Token (จากผู้ดูแลระบบ)</label>
        <input type="text" id="setup-token" name="setup_token" required>
      </div>
      <div class="form-group">
        <label for="setup-password">ตั้งรหัสผ่าน (อย่างน้อย 8 ตัว)</label>
        <div class="pw-wrap">
          <input type="password" id="setup-password" name="password" minlength="8" required autocomplete="new-password">
          <button type="button" class="pw-toggle" onclick="togglePw(this)">👁</button>
        </div>
      </div>
      <div class="form-group">
        <label for="setup-confirm">ยืนยันรหัสผ่าน</label>
        <div class="pw-wrap">
          <input type="password" id="setup-confirm" minlength="8" required autocomplete="new-password">
          <button type="button" class="pw-toggle" onclick="togglePw(this)">👁</button>
        </div>
      </div>
      <button type="submit" class="btn btn-primary" id="setup-btn">ตั้งรหัสผ่าน</button>
      <button type="button" class="btn btn-secondary" onclick="showLoginForm()" style="margin-top:0.5rem;width:100%">กลับหน้าเข้าสู่ระบบ</button>
    </form>
  </div>

  <div class="login-footer">
    <a href="#" onclick="showSetupForm(); return false;">ตั้งรหัสผ่านครั้งแรก</a>
  </div>
</div>

<script>
function togglePw(btn) {
  const input = btn.parentElement.querySelector('input');
  const show = input.type === 'password';
  input.type = show ? 'text' : 'password';
  btn.textContent = show ? '🙈' : '👁';
}

function showMessage(text, type) {
  const div = document.createElement('div');
  div.className = `alert alert-${type}`;
  div.textContent = text;
  const msg = document.getElementById('message');
  msg.innerHTML = '';
  msg.appendChild(div);
}

function showLoginForm() {
  document.getElementById('login-form').style.display = '';
  document.getElementById('setup-form').style.display = 'none';
}

function showSetupForm() {
  document.getElementById('login-form').style.display = 'none';
  document.getElementById('setup-form').style.display = 'block';
  document.getElementById('message').innerHTML = '';
}

async function handleLogin(e) {
  e.preventDefault();
  const btn = document.getElementById('login-btn');
  btn.disabled = true; btn.textContent = 'กำลังเข้าสู่ระบบ...';

  const phone = document.getElementById('phone').value.trim();
  const password = document.getElementById('password').value;

  try {
    const res = await fetch('/api/auth/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      credentials: 'include',
      body: JSON.stringify({ phone, password })
    });
    const data = await res.json();

    if (!res.ok) {
      if (data.needSetup) {
        showSetupForm();
        document.getElementById('setup-phone').value = phone;
        showMessage('กรุณาตั้งรหัสผ่านก่อนเข้าใช้งาน', 'success');
      } else {
        showMessage(data.error || 'เข้าสู่ระบบไม่สำเร็จ', 'error');
      }
      btn.disabled = false; btn.textContent = 'เข้าสู่ระบบ';
      return;
    }

    // Save user info locally for quick access
    localStorage.setItem('currentUser', JSON.stringify(data.data));
    window.location.href = '/app.html';
  } catch (err) {
    showMessage('ไม่สามารถเชื่อมต่อเซิร์ฟเวอร์ได้', 'error');
    btn.disabled = false; btn.textContent = 'เข้าสู่ระบบ';
  }
}

async function handleSetPassword(e) {
  e.preventDefault();
  const btn = document.getElementById('setup-btn');
  const pw = document.getElementById('setup-password').value;
  const confirm = document.getElementById('setup-confirm').value;

  if (pw !== confirm) { showMessage('รหัสผ่านไม่ตรงกัน', 'error'); return; }
  if (pw.length < 8) { showMessage('รหัสผ่านต้องมีอย่างน้อย 8 ตัวอักษร', 'error'); return; }

  btn.disabled = true; btn.textContent = 'กำลังตั้งรหัสผ่าน...';

  try {
    const res = await fetch('/api/auth/set-password', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      credentials: 'include',
      body: JSON.stringify({
        phone: document.getElementById('setup-phone').value.trim(),
        setup_token: document.getElementById('setup-token').value.trim(),
        password: pw
      })
    });
    const data = await res.json();

    if (!res.ok) {
      showMessage(data.error || 'ตั้งรหัสผ่านไม่สำเร็จ', 'error');
      btn.disabled = false; btn.textContent = 'ตั้งรหัสผ่าน';
      return;
    }

    localStorage.setItem('currentUser', JSON.stringify(data.data));
    window.location.href = '/app.html';
  } catch (err) {
    showMessage('ไม่สามารถเชื่อมต่อเซิร์ฟเวอร์ได้', 'error');
    btn.disabled = false; btn.textContent = 'ตั้งรหัสผ่าน';
  }
}

// If already logged in, redirect
(async function() {
  try {
    const res = await fetch('/api/auth/me', { credentials: 'include' });
    if (res.ok) window.location.href = '/app.html';
  } catch {}
})();
</script>
</body>
</html>
